name: 'Busbar SF Schema'
description: 'Pull Salesforce org schema and write per-SObject describe JSON files into the repo'
author: 'busbar.agency'
branding:
  icon: 'database'
  color: 'blue'

inputs:
  sf-access-token:
    description: 'Salesforce session access token (provide via secrets).'
    required: true
  sf-instance-url:
    description: 'Salesforce instance URL, e.g. https://yourdomain.my.salesforce.com'
    required: true

  output-path:
    description: 'Where the per-SObject describe JSON files are written, relative to the repo root.'
    required: false
    default: '.busbar/Platforms/Salesforce/Schema'

  filters:
    description: |
      Comma-separated SObject filter flags. Valid values:
        createable, updateable, deletable, queryable, retrieveable, searchable,
        custom, standard
    required: false
    default: ''
  name-match:
    description: 'Glob over SObject API names (e.g. "Account*" or "*__c"). Applied in addition to filters.'
    required: false
    default: ''
  objects:
    description: 'Explicit comma-separated SObject names to export. Overrides filters/name-match when set.'
    required: false
    default: ''
  min-field-count:
    description: 'Drop SObjects with fewer than this many fields.'
    required: false
    default: ''
  max-field-count:
    description: 'Drop SObjects with more than this many fields.'
    required: false
    default: ''
  include-counts:
    description: 'Include record counts in the export (one extra API call per SObject).'
    required: false
    default: 'false'

  version:
    description: 'sf-schema-dump release tag to download (e.g. v0.4.2). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo that publishes the sf-schema-dump binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

  commit:
    description: 'Commit any changes back to the current branch after the pull.'
    required: false
    default: 'true'
  commit-message:
    description: 'Commit message used when changes are committed.'
    required: false
    default: 'chore(schema): refresh Salesforce schema'
  git-user-name:
    description: 'git user.name for the commit.'
    required: false
    default: 'busbar-bot'
  git-user-email:
    description: 'git user.email for the commit.'
    required: false
    default: 'bot@busbar.agency'

outputs:
  changed:
    description: '"true" if the schema export produced changes that were committed (or would have been).'
    value: ${{ steps.export.outputs.changed }}
  object-count:
    description: 'Number of describe JSON files written.'
    value: ${{ steps.export.outputs.written_count }}
  selected-count:
    description: 'Number of SObjects selected after filtering.'
    value: ${{ steps.export.outputs.selected_count }}
  failed-count:
    description: 'Number of SObjects that failed describe.'
    value: ${{ steps.export.outputs.failed_count }}
  output-path:
    description: 'Path where the schema was written (echoes the input).'
    value: ${{ steps.export.outputs.output_dir }}

# The binary owns all logic and UX: it reads its inputs from INPUT_*, calls the
# SF Describe API, writes one JSON file per SObject, computes the counts, writes
# GITHUB_OUTPUT (including `changed`), the step summary and annotations, and —
# when `commit` is true — commits the refreshed schema back to the branch. This
# action only installs the binary and passes inputs through as env.
#
# NOTE: the min-field-count / max-field-count / include-counts inputs are
# retained for contract compatibility but are no-ops (typesynth-cache specific;
# the describe-based dump does not implement them).
runs:
  using: 'composite'
  steps:
    - name: Set up sf-schema-dump
      uses: busbar-actions/setup@main
      with:
        binary: sf-schema-dump
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Export schema
      id: export
      shell: bash
      env:
        INPUT_OUTPUT_PATH: ${{ inputs.output-path }}
        INPUT_FILTERS: ${{ inputs.filters }}
        INPUT_NAME_MATCH: ${{ inputs.name-match }}
        INPUT_OBJECTS: ${{ inputs.objects }}
        INPUT_COMMIT: ${{ inputs.commit }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        INPUT_GIT_USER_NAME: ${{ inputs.git-user-name }}
        INPUT_GIT_USER_EMAIL: ${{ inputs.git-user-email }}
        SF_ACCESS_TOKEN: ${{ inputs.sf-access-token }}
        SF_INSTANCE_URL: ${{ inputs.sf-instance-url }}
      run: sf-schema-dump
