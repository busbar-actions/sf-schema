name: 'Busbar SF Schema'
description: 'Pull Salesforce org schema and write per-SObject describe JSON files into the repo'
author: 'busbar.agency'
branding:
  icon: 'database'
  color: 'blue'

inputs:
  target-instance:
    description: |
      Instance URL of the Busbar-equipped Salesforce org to authenticate to,
      e.g. https://yourdomain.my.salesforce.com. This is the DEFAULT auth path:
      the binary mints its OWN short-lived token in-process from the runner's
      GitHub OIDC id-token (no SF token ever touches the workflow). Requires the
      caller job to grant `permissions: id-token: write`.
    required: false
    default: ''

  eca-client-id:
    description: 'OPTIONAL override of the External Client App consumer key (client_id) used for the OIDC exchange. Has a PBO-pinned default; only set this on a consumer-key rotation.'
    required: false
    default: ''
  token-handler:
    description: 'OPTIONAL override of the Apex token-exchange handler dev name. Defaults to BBGitHubTokenExchangeHandler.'
    required: false
    default: ''
  oidc-audience:
    description: 'OPTIONAL override of the audience requested in the GitHub OIDC token. Defaults to the target-instance URL.'
    required: false
    default: ''

  sf-access-token:
    description: |
      OPTIONAL local-dev / advanced override: a handed-off Salesforce session
      access token. If set (together with sf-instance-url), the binary uses it
      DIRECTLY and SKIPS the OIDC exchange. Leave empty in CI — prefer the
      OIDC `target-instance` path so no SF token is ever passed through the
      workflow.
    required: false
    default: ''
  sf-instance-url:
    description: 'OPTIONAL local-dev / advanced override paired with sf-access-token. Salesforce instance URL, e.g. https://yourdomain.my.salesforce.com'
    required: false
    default: ''

  output-path:
    description: 'Where the per-SObject describe JSON files are written, relative to the repo root.'
    required: false
    default: '.busbar/Platforms/Salesforce/Schema'

  filters:
    description: |
      Comma-separated SObject filter flags. Valid values:
        createable, updateable, deletable, queryable, retrieveable, searchable,
        custom, standard
    required: false
    default: ''
  name-match:
    description: 'Glob over SObject API names (e.g. "Account*" or "*__c"). Applied in addition to filters.'
    required: false
    default: ''
  objects:
    description: 'Explicit comma-separated SObject names to export. Overrides filters/name-match when set.'
    required: false
    default: ''

  version:
    description: 'sf-schema-dump release tag to download (e.g. v0.4.2). "latest" resolves the most recent release.'
    required: false
    default: 'latest'
  binary-repo:
    description: 'GitHub repo that publishes the sf-schema-dump binary releases.'
    required: false
    default: 'busbar-actions/actions-dist'

  commit:
    description: 'Commit any changes back to the current branch after the pull.'
    required: false
    default: 'true'
  commit-message:
    description: 'Commit message used when changes are committed.'
    required: false
    default: 'chore(schema): refresh Salesforce schema'
  git-user-name:
    description: 'git user.name for the commit.'
    required: false
    default: 'busbar-bot'
  git-user-email:
    description: 'git user.email for the commit.'
    required: false
    default: 'bot@busbar.agency'

outputs:
  changed:
    description: '"true" if the schema export produced changes that were committed (or would have been).'
    value: ${{ steps.export.outputs.changed }}
  object-count:
    description: 'Number of describe JSON files written.'
    value: ${{ steps.export.outputs.written_count }}
  selected-count:
    description: 'Number of SObjects selected after filtering.'
    value: ${{ steps.export.outputs.selected_count }}
  failed-count:
    description: 'Number of SObjects that failed describe.'
    value: ${{ steps.export.outputs.failed_count }}
  output-path:
    description: 'Path where the schema was written (echoes the input).'
    value: ${{ steps.export.outputs.output_dir }}

# The binary owns all logic and UX: it reads its inputs from INPUT_*, calls the
# SF Describe API, writes one JSON file per SObject, computes the counts, writes
# GITHUB_OUTPUT (including `changed`), the step summary and annotations, and —
# when `commit` is true — commits the refreshed schema back to the branch. This
# action only installs the binary and passes inputs through as env.
runs:
  using: 'composite'
  steps:
    - name: Install the sf-schema-dump binary from actions-dist
      uses: busbar-actions/setup@main
      with:
        binary: sf-schema-dump
        version: ${{ inputs.version }}
        binary-repo: ${{ inputs.binary-repo }}

    - name: Dump the selected SObject schema from the Busbar-equipped org to per-SObject JSON
      id: export
      shell: bash
      env:
        INPUT_OUTPUT_PATH: ${{ inputs.output-path }}
        INPUT_FILTERS: ${{ inputs.filters }}
        INPUT_NAME_MATCH: ${{ inputs.name-match }}
        INPUT_OBJECTS: ${{ inputs.objects }}
        INPUT_COMMIT: ${{ inputs.commit }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit-message }}
        INPUT_GIT_USER_NAME: ${{ inputs.git-user-name }}
        INPUT_GIT_USER_EMAIL: ${{ inputs.git-user-email }}
        # ---- Auth (busbar-auth session_from_env) ----
        # DEFAULT: self-mint via GitHub OIDC. SF_INSTANCE_URL = the Busbar-equipped
        # org's instance URL (from target-instance, or the sf-instance-url override).
        # SF_ACCESS_TOKEN is set ONLY when the caller supplies the optional
        # local-dev override; when it is absent, busbar-auth performs the in-process
        # OIDC token exchange. NO Salesforce token is ever written to GITHUB_ENV or
        # handed off between steps.
        SF_INSTANCE_URL: ${{ inputs.target-instance != '' && inputs.target-instance || inputs.sf-instance-url }}
        SF_ACCESS_TOKEN: ${{ inputs.sf-access-token }}
        ECA_CLIENT_ID: ${{ inputs.eca-client-id }}
        TOKEN_HANDLER_APEX: ${{ inputs.token-handler }}
        OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
      run: |
        set -euo pipefail
        echo "Dumping SObject describe JSON from ${SF_INSTANCE_URL} into ${INPUT_OUTPUT_PATH} (objects='${INPUT_OBJECTS}' filters='${INPUT_FILTERS}' name-match='${INPUT_NAME_MATCH}')"
        sf-schema-dump
